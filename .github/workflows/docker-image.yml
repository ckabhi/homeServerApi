name: Build and Push ARM64 Image

on:
  push:
    # branches: ['main']
    tags: ['v*.*.*'] # Trigger on version tags like v1.0.0

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/homeserver-api

jobs:
  build-and-push:
    # It checks if the tag being pushed is actually part of the 'main' branch history
    # if: github.ref_type == 'tag' && github.event.base_ref == 'refs/heads/main'
    if: contains(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch 50 commits: fast, but enough to verify branch history
          fetch-depth: 200

      - name: Verify tag is on main branch
        run: |
          # 1. Fetch the remote main so we have something to compare against
          git fetch origin main

          # 2. Extract the tag name for your error message
          TAG_NAME=${GITHUB_REF#refs/tags/}

          # 3. Use the SHA of the tag to check its history against main
          if ! git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "Error: Tag $TAG_NAME is not on the main branch history."
            exit 1
          fi
          echo "Success: Tag $TAG_NAME is verified on main."

      # 1. Set up QEMU for ARM64 emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Set up Docker Buildx for cross-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
            # prefix=arm64-
          tags: |
            # When you push v1.0, this makes it the new 'latest'
            type=raw,value=latest
            # This creates the '1.0' tag
            type=semver,pattern={{version}},prefix=arm64-

      # 3. Build and push specifically for ARM64
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64 # <--- Crucial for Raspberry Pi 5
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha # Uses GitHub Actions cache to speed up builds
          cache-to: type=gha,mode=max
